services:
  # --- DATABASE: PostgreSQL 16 ---
  db:
    image: postgres:16-alpine
    container_name: sb-postgres
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - sb_db_data:/var/lib/postgresql/data
    networks:
      - sb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- BACKEND: Node.js 24 (Krypton) ---
  app:
    build:
      context: .
      dockerfile: Dockerfile.development
    container_name: sb-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - sb-network
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "pnpm prisma migrate dev && pnpm tsx --watch --env-file=.env src/server.ts"

networks:
  sb-network:
    driver: bridge

volumes:
  sb_db_data: