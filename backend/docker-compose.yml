services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-buffet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartbuffet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartbuffet}
      POSTGRES_DB: ${POSTGRES_DB:-smartbuffet}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-smartbuffet}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
